<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odoo Spreadsheet - Sales Commission Module</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="odoo-dashboard">
    <div class="odoo-top-bar">
        <h1>Spreadsheet / Commission Engine</h1>
        <span style="font-size: 13px; opacity: 0.9;">Scenario A • Progressive YTD Logic</span>
    </div>

    <div class="odoo-meta-info">
        <div style="font-weight: 500;">YTD Performance Strategy Dashboard</div>
        <div class="quota-tag">Required Monthly Target Goals: <strong>$700 MRR</strong> & <strong>$6,000 NRR</strong></div>
    </div>

    <div id="spreadsheet-workspace"></div>

    <div class="odoo-kpi-panel">
        <div class="kpi-card">
            <label id="mrr-kpi-label">YTD MRR Attainment Track</label>
            <span id="annual-mrr-pct">0.0%</span>
        </div>
        <div class="kpi-card">
            <label id="nrr-kpi-label">YTD NRR Attainment Track</label>
            <span id="annual-nrr-pct">0.0%</span>
        </div>
        <div class="kpi-card">
            <label>Total Commissions Payout (YTD)</label>
            <span id="annual-payout" class="total-earnings">$0.00</span>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
